name: OSS Experimental Postgres S3

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/experimental/**'
      - 'migrations/postgres/**'
      - 'tests/postgres-s3-experimental.node-test.ts'

jobs:
  experimental:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run test:experimental:postgres-s3
