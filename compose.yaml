services:
  fluent-oss:
    build:
      context: .
      dockerfile: Dockerfile
    image: fluent-oss:local
    restart: unless-stopped
    environment:
      FLUENT_OSS_HOST: "${FLUENT_OSS_HOST:-0.0.0.0}"
      FLUENT_OSS_PORT: "${FLUENT_OSS_PORT:-8788}"
      FLUENT_OSS_ROOT: "${FLUENT_OSS_ROOT:-/var/lib/fluent}"
    ports:
      - "${FLUENT_OSS_BIND:-127.0.0.1}:${FLUENT_OSS_PORT:-8788}:${FLUENT_OSS_PORT:-8788}"
    volumes:
      - fluent-oss-data:${FLUENT_OSS_ROOT:-/var/lib/fluent}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch(`http://127.0.0.1:${process.env.FLUENT_OSS_PORT || 8788}/health`).then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  fluent-oss-data:
